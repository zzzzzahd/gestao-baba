# .github/workflows/ci.yml
# CI completo: lint + testes unitários + cobertura + build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Documentação e estrutura de testes ────────────────────────────────
  lint:
    name: 📋 Docs e estrutura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar estrutura de testes
        run: |
          test -f GUIA-TESTES.md
          test -f CHECKLIST-TESTES.md
          test -f .env.example
          test -d e2e
          test -f e2e/smoke.spec.js
          test -f playwright.config.js
          grep -q VITE_SUPABASE_PUBLISHABLE_KEY .env.example
          grep -q VITE_SUPABASE_URL .env.example

  # ── Job 2: Testes unitários + cobertura ───────────────────────────────────────
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (com cobertura)
        run: npm run test:coverage
        env:
          CI: true
          VITE_SUPABASE_URL:             https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          VITE_VAPID_PUBLIC_KEY:         placeholder-vapid-key
          VITE_SENTRY_DSN:              ''

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload test results (JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      # Opcional: publicar cobertura no PR como comentário
      - name: Coverage summary
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ── Job 3: Build de produção ──────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test  # só builda se testes passarem
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:             https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          VITE_VAPID_PUBLIC_KEY:         placeholder-vapid-key
          VITE_SENTRY_DSN:              ''
          SENTRY_AUTH_TOKEN:            ''

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
