<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DRAFT - Gestão de Baba</title>
    
    <meta name="description" content="Sistema profissional de gestão de peladas e babas">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DRAFT">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
      /* --- VARIÁVEIS DO LOGO DRAFT PLAY --- */
      :root {
        /* Define o Azul Cyan Padrão que você usa no projeto */
        --cyan-electric: #00f2ff; 
      }

      /* Classe para aplicar a fonte Rajdhani que você já carregou */
      .font-display {
        font-family: 'Rajdhani', sans-serif;
      }

      /* Animação de entrada suave para o logo */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fade-in 0.6s ease-out forwards;
      }
      /* ------------------------------------ */

      /* Reset tático original */
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        font-family: 'Inter', sans-serif;
        color: white;
        overflow-x: hidden;
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      /* Estilização da Scrollbar Neon */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #00f2ff;
        border-radius: 10px;
        box-shadow: 0 0 10px #00f2ff;
      }

      /* Prevenção de seleção de texto em botões para parecer App Nativo */
      button {
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
